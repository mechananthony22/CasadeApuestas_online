{% extends "base.html" %}
{% block title %}Dashboard - FairBet Lab{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8"
     x-data="dashboard()" x-init="init()">

    <template x-if="!token">
        <div class="text-center py-20">
            <h2 class="text-2xl font-bold text-gray-400">Debes iniciar sesión</h2>
            <a href="{% url 'login' %}" class="mt-4 inline-block bg-accent text-white px-6 py-3 rounded-xl hover:bg-accent-hover">Ir a Login</a>
        </div>
    </template>

    <template x-if="token">
        <div>
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-8">
                <div>
                    <h1 class="text-3xl font-bold">Bienvenido, <span class="text-accent" x-text="user.username"></span></h1>
                    <p class="text-gray-400 mt-1">Panel de control — FairBet Lab</p>
                </div>
                <div class="mt-4 sm:mt-0 bg-card rounded-xl border border-accent/30 px-6 py-4">
                    <p class="text-sm text-gray-400">Saldo disponible</p>
                    <p class="text-2xl font-bold text-win" x-text="'S/ ' + balance"></p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-card rounded-xl border border-gray-800 p-6">
                    <h3 class="text-lg font-semibold mb-4">Apuestas Activas</h3>
                    <p class="text-3xl font-bold text-accent" x-text="stats.active_bets || 0"></p>
                </div>
                <div class="bg-card rounded-xl border border-gray-800 p-6">
                    <h3 class="text-lg font-semibold mb-4">Eventos en Vivo</h3>
                    <p class="text-3xl font-bold text-orange-500" x-text="stats.live_events || 0"></p>
                </div>
                <div class="bg-card rounded-xl border border-gray-800 p-6">
                    <h3 class="text-lg font-semibold mb-4">Próximos Eventos</h3>
                    <p class="text-3xl font-bold text-blue-500" x-text="stats.upcoming_events || 0"></p>
                </div>
            </div>

            <div class="bg-card rounded-xl border border-gray-800 p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold">Últimos Eventos</h2>
                    <a href="{% url 'events-list' %}" class="text-accent hover:underline text-sm font-medium">Ver todos</a>
                </div>
                <template x-if="events.length === 0">
                    <p class="text-gray-500 text-center py-8">No hay eventos disponibles</p>
                </template>
                <div class="space-y-3" x-show="events.length > 0">
                    <template x-for="ev in events.slice(0,5)" :key="ev.id">
                        <a :href="'/events/' + ev.id + '/'" class="flex justify-between items-center p-4 bg-[#222] rounded-xl hover:bg-[#2a2a2a] transition">
                            <div>
                                <p class="font-semibold" x-text="ev.name || (ev.home_team?.name + ' vs ' + ev.away_team?.name)"></p>
                                <p class="text-sm text-gray-400" x-text="ev.status"></p>
                            </div>
                            <span class="text-sm text-gray-500" x-text="ev.start_date || ev.date"></span>
                        </a>
                    </template>
                </div>
            </div>

            <div class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                <a href="{% url 'wallet-deposit' %}" class="bg-card rounded-xl border border-accent/30 p-6 hover:bg-[#222] transition text-center">
                    <p class="text-lg font-semibold text-accent">+ Recargar Fichas</p>
                    <p class="text-sm text-gray-400 mt-1">Deposita fichas virtuales</p>
                </a>
                <a href="{% url 'bets-list' %}" class="bg-card rounded-xl border border-gray-800 p-6 hover:bg-[#222] transition text-center">
                    <p class="text-lg font-semibold">Mis Apuestas</p>
                    <p class="text-sm text-gray-400 mt-1">Historial de apuestas</p>
                </a>
            </div>
        </div>
    </template>
</div>
{% endblock %}

{% block extra_js %}
<script>
function dashboard() {
    return {
        token: localStorage.getItem('access_token'),
        user: JSON.parse(localStorage.getItem('user') || '{}'),
        balance: '0.00',
        events: [],
        stats: { active_bets: 0, live_events: 0, upcoming_events: 0 },
        async init() {
            if (!this.token) return;
            await Promise.all([this.loadBalance(), this.loadEvents(), this.loadBets()]);
        },
        async loadBalance() {
            const data = await apiFetch('/wallet/balance/');
            if (data._status === 200) this.balance = data.balance || '0.00';
        },
        async loadEvents() {
            const data = await apiFetch('/betting/events/');
            const list = data.results || data || [];
            this.events = list;
            this.stats.live_events = list.filter(e => e.status === 'live').length;
            this.stats.upcoming_events = list.filter(e => e.status === 'scheduled').length;
        },
        async loadBets() {
            const data = await apiFetch('/betting/bets/');
            const list = data.results || data || [];
            this.stats.active_bets = list.filter(e => e.status === 'accepted').length;
        },
    };
}
</script>
{% endblock %}
