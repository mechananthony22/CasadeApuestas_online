{% extends "base.html" %}
{% load static %}

{% block title %}Registro - JUANCHO HBET{% endblock %}

{% block content %}
<div class="min-h-[85vh] relative flex items-center justify-center px-4 py-12 overflow-hidden">
    <!-- Glowing background decorative circles -->
    <div class="absolute top-1/4 left-1/4 w-80 h-80 bg-accent/15 rounded-full blur-[100px] pointer-events-none animate-pulse" style="animation-duration: 8s;"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-[#b91c1c]/10 rounded-full blur-[120px] pointer-events-none animate-pulse" style="animation-duration: 12s;"></div>

    <!-- Translucent Glassmorphic Card -->
    <div class="relative z-10 bg-card/60 border border-white/10 rounded-2xl shadow-[0_8px_32px_0_rgba(0,0,0,0.5)] p-8 w-full max-w-xl backdrop-blur-xl animate-fade-in"
         x-data="registerForm()"
         x-init="init()">

         <div class="text-center mb-8">
            <span class="inline-flex items-center justify-center w-12 h-12 bg-accent/10 rounded-2xl border border-accent/30 mb-4 shadow-[0_0_15px_rgba(220,38,38,0.2)]">
                <svg class="w-6 h-6 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
                </svg>
            </span>
            <h1 class="text-3xl font-black bg-gradient-to-r from-white via-gray-200 to-gray-400 bg-clip-text text-transparent tracking-tight">Crear Cuenta</h1>
            <p class="text-gray-400 mt-2 text-xs font-semibold">Completa tus datos para registrarte en JUANCHO HBET</p>
        </div>

        <form @submit.prevent="submit" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
                <!-- Column 1 -->
                <div class="space-y-4">
                    <div>
                        <label class="block text-gray-300 font-medium mb-1.5 text-sm">Usuario</label>
                        <input type="text" x-model="form.username" required
                            class="w-full px-4 py-3 bg-dark/60 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:border-accent focus:ring-2 focus:ring-accent/20 outline-none transition duration-300"
                            placeholder="Elige tu usuario">
                    </div>

                    <div>
                        <label class="block text-gray-300 font-medium mb-1.5 text-sm">Email</label>
                        <input type="email" x-model="form.email" required
                            class="w-full px-4 py-3 bg-dark/60 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:border-accent focus:ring-2 focus:ring-accent/20 outline-none transition duration-300"
                            placeholder="tu@email.com">
                    </div>

                    <div>
                        <label class="block text-gray-300 font-medium mb-1.5 text-sm">DNI Peruano</label>
                        <input type="text" x-model="form.dni" required maxlength="8"
                            class="w-full px-4 py-3 bg-dark/60 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:border-accent focus:ring-2 focus:ring-accent/20 outline-none transition duration-300"
                            placeholder="DNI de 8 dígitos">
                    </div>
                </div>

                <!-- Column 2 -->
                <div class="space-y-4">
                    <div>
                        <label class="block text-gray-300 font-medium mb-1.5 text-sm">Fecha de Nacimiento</label>
                        <input type="date" x-model="form.birth_date" required
                            class="w-full px-4 py-3 bg-dark/60 border border-white/10 rounded-xl text-white focus:border-accent focus:ring-2 focus:ring-accent/20 outline-none transition duration-300 [color-scheme:dark]">
                    </div>

                    <div>
                        <label class="block text-gray-300 font-medium mb-1.5 text-sm">Contraseña</label>
                        <input type="password" x-model="form.password" required minlength="8"
                            class="w-full px-4 py-3 bg-dark/60 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:border-accent focus:ring-2 focus:ring-accent/20 outline-none transition duration-300"
                            placeholder="Mínimo 8 caracteres">
                    </div>

                    <div>
                        <label class="block text-gray-300 font-medium mb-1.5 text-sm">Confirmar Contraseña</label>
                        <input type="password" x-model="form.confirm_password" required
                            class="w-full px-4 py-3 bg-dark/60 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:border-accent focus:ring-2 focus:ring-accent/20 outline-none transition duration-300"
                            placeholder="Repite tu contraseña">
                    </div>
                </div>
            </div>

            <template x-if="error">
                <div class="bg-accent/15 border border-accent/30 text-red-400 px-4 py-3 rounded-xl text-sm backdrop-blur-sm shadow-[0_0_15px_rgba(220,38,38,0.1)]" x-text="error"></div>
            </template>

            <button type="submit" :disabled="loading"
                class="w-full bg-accent hover:bg-accent-hover text-white py-3.5 rounded-xl font-bold text-lg hover:shadow-[0_0_20px_rgba(22,163,74,0.3)] disabled:opacity-50 disabled:cursor-not-allowed transform active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-2">
                <span x-show="!loading">Crear Cuenta</span>
                <span x-show="loading" class="flex items-center gap-2">
                    <svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                    </svg>
                    Registrando...
                </span>
            </button>
        </form>

        <p class="text-center mt-6 text-sm text-gray-400">
            ¿Ya tienes cuenta?
            <a href="{% url 'login' %}" class="text-accent hover:text-[#f87171] font-semibold transition hover:underline">Inicia sesión</a>
        </p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function getCookie(name) {
    let val = null;
    if (document.cookie) {
        document.cookie.split('; ').some(c => {
            if (c.startsWith(name + '=')) { val = decodeURIComponent(c.substring(name.length + 1)); return true; }
        });
    }
    return val;
}

function registerForm() {
    return {
        form: {
            username: '',
            email: '',
            dni: '',
            birth_date: '',
            password: '',
            confirm_password: '',
        },
        error: '',
        loading: false,
        init() {
            if (localStorage.getItem('access_token')) {
                window.location.href = '{% url "dashboard" %}';
            }
        },
        async submit() {
            this.error = '';
            if (this.form.password !== this.form.confirm_password) {
                this.error = 'Las contraseñas no coinciden.';
                return;
            }
            if (this.form.password.length < 8) {
                this.error = 'La contraseña debe tener al menos 8 caracteres.';
                return;
            }
            this.loading = true;
            try {
                const res = await fetch('/api/v1/auth/register/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken'),
                    },
                    body: JSON.stringify({
                        username: this.form.username,
                        email: this.form.email,
                        dni: this.form.dni,
                        birth_date: this.form.birth_date,
                        password: this.form.password,
                        confirm_password: this.form.confirm_password,
                    }),
                });
                const data = await res.json();
                if (res.ok) {
                    this.error = '';
                    alert('Registro exitoso. Ahora puedes iniciar sesión.');
                    window.location.href = '{% url "login" %}';
                } else {
                    const msgs = Object.values(data).flat().join(' ');
                    this.error = msgs || 'Error al registrar. Verifica tus datos.';
                }
            } catch (e) {
                this.error = 'Error de conexión. Verifica tu internet e intenta de nuevo.';
            } finally {
                this.loading = false;
            }
        },
    };
}
</script>
{% endblock %}
