{% extends "base.html" %}
{% block title %}Billetera - FairBet Lab{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8"
     x-data="wallet()" x-init="init()">

    <h1 class="text-3xl font-bold mb-8">Billetera Virtual</h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-card rounded-xl border border-gray-800 p-6">
            <p class="text-sm text-gray-400">Saldo Disponible</p>
            <p class="text-3xl font-bold text-win mt-2" x-text="'S/ ' + balance"></p>
        </div>
        <div class="bg-card rounded-xl border border-gray-800 p-6">
            <p class="text-sm text-gray-400">Total Depositado</p>
            <p class="text-3xl font-bold text-blue-500 mt-2" x-text="'S/ ' + totalDeposit"></p>
        </div>
        <div class="bg-card rounded-xl border border-gray-800 p-6">
            <p class="text-sm text-gray-400">Total Retirado</p>
            <p class="text-3xl font-bold text-orange-500 mt-2" x-text="'S/ ' + totalWithdraw"></p>
        </div>
    </div>

    <div class="flex gap-4 mb-8">
        <a href="{% url 'wallet-deposit' %}" class="bg-accent hover:bg-accent-hover text-white px-6 py-3 rounded-xl font-semibold transition">+ Depositar</a>
    </div>

    <div class="bg-card rounded-xl border border-gray-800 p-6">
        <h2 class="text-xl font-bold mb-4">Últimos Movimientos</h2>
        <template x-if="movements.length === 0">
            <p class="text-gray-500 text-center py-8">Sin movimientos</p>
        </template>
        <div class="space-y-2">
            <template x-for="mov in movements" :key="mov.id">
                <div class="flex justify-between items-center py-3 border-b border-gray-800 last:border-0">
                    <div>
                        <p class="font-semibold" x-text="mov.description"></p>
                        <p class="text-xs text-gray-500" x-text="mov.created_at"></p>
                    </div>
                    <span class="font-bold" :class="mov.direction === 'credit' ? 'text-win' : 'text-red-400'"
                          x-text="(mov.direction === 'credit' ? '+ ' : '- ') + 'S/ ' + mov.amount"></span>
                </div>
            </template>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function wallet() {
    return {
        balance: '0.00',
        totalDeposit: '0.00',
        totalWithdraw: '0.00',
        movements: [],

        async init() {
            if (!localStorage.getItem('access_token')) { window.location.href = '/login/'; return; }
            const data = await apiFetch('/wallet/balance/');
            if (data._status === 200) {
                this.balance = data.balance || '0.00';
                this.totalDeposit = data.total_depositado || '0.00';
                this.totalWithdraw = data.total_retirado || '0.00';
                this.movements = data.ultimos_movimientos || [];
            }
        },
    };
}
</script>
{% endblock %}
