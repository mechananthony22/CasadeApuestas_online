{% extends "base.html" %}
{% load static %}

{% block title %}Iniciar Sesión - FairBet Lab{% endblock %}

{% block content %}
<div class="min-h-[85vh] relative flex items-center justify-center px-4 py-12 overflow-hidden">
    <!-- Glowing background decorative circles -->
    <div class="absolute top-1/4 left-1/3 w-80 h-80 bg-accent/15 rounded-full blur-[100px] pointer-events-none animate-pulse" style="animation-duration: 6s;"></div>
    <div class="absolute bottom-1/4 right-1/3 w-96 h-96 bg-[#b91c1c]/10 rounded-full blur-[120px] pointer-events-none animate-pulse" style="animation-duration: 10s;"></div>

    <!-- Translucent Glassmorphic Card -->
    <div class="relative z-10 bg-card/60 border border-white/10 rounded-2xl shadow-[0_8px_32px_0_rgba(0,0,0,0.5)] p-8 w-full max-w-md backdrop-blur-xl"
         x-data="loginForm()"
         x-init="init()">

        <div class="text-center mb-8">
            <span class="inline-flex items-center justify-center w-12 h-12 bg-accent/10 rounded-2xl border border-accent/30 mb-4 shadow-[0_0_15px_rgba(220,38,38,0.2)]">
                <svg class="w-6 h-6 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
            </span>
            <h1 class="text-3xl font-bold bg-gradient-to-r from-white via-gray-200 to-gray-400 bg-clip-text text-transparent tracking-tight">FairBet Lab</h1>
            <p class="text-gray-400 mt-2 text-sm">Plataforma educativa de apuestas deportivas</p>
        </div>

        <form @submit.prevent="submit" class="space-y-5">
            <div>
                <label class="block text-gray-300 font-medium mb-1.5 text-sm">Usuario</label>
                <input type="text" x-model="username" required autocomplete="username"
                    class="w-full px-4 py-3 bg-dark/60 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:border-accent focus:ring-2 focus:ring-accent/20 outline-none transition duration-300"
                    placeholder="Ingresa tu usuario">
            </div>

            <div>
                <label class="block text-gray-300 font-medium mb-1.5 text-sm">Contraseña</label>
                <input type="password" x-model="password" required autocomplete="current-password"
                    class="w-full px-4 py-3 bg-dark/60 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:border-accent focus:ring-2 focus:ring-accent/20 outline-none transition duration-300"
                    placeholder="Ingresa tu contraseña">
            </div>

            <template x-if="error">
                <div class="bg-accent/15 border border-accent/30 text-red-400 px-4 py-3 rounded-xl text-sm backdrop-blur-sm shadow-[0_0_15px_rgba(220,38,38,0.1)]" x-text="error"></div>
            </template>

            <button type="submit" :disabled="loading"
                class="w-full bg-gradient-to-r from-accent to-[#f87171] hover:from-[#f87171] hover:to-accent text-white py-3.5 rounded-xl font-semibold text-lg hover:shadow-[0_0_20px_rgba(220,38,38,0.3)] disabled:opacity-50 disabled:cursor-not-allowed transform active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-2">
                <span x-show="!loading">Iniciar Sesión</span>
                <span x-show="loading" class="flex items-center gap-2">
                    <svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                    </svg>
                    Ingresando...
                </span>
            </button>
        </form>

        <p class="text-center mt-6 text-sm text-gray-400">
            ¿No tienes cuenta?
            <a href="{% url 'register' %}" class="text-accent hover:text-[#f87171] font-semibold transition hover:underline">Regístrate aquí</a>
        </p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function getCookie(name) {
    let val = null;
    if (document.cookie) {
        document.cookie.split('; ').some(c => {
            if (c.startsWith(name + '=')) { val = decodeURIComponent(c.substring(name.length + 1)); return true; }
        });
    }
    return val;
}

function loginForm() {
    return {
        username: '',
        password: '',
        error: '',
        loading: false,
        init() {
            if (localStorage.getItem('access_token')) {
                window.location.href = '{% url "dashboard" %}';
            }
        },
        async submit() {
            this.error = '';
            this.loading = true;
            try {
                const res = await fetch('/api/v1/auth/login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken'),
                    },
                    body: JSON.stringify({
                        username: this.username,
                        password: this.password,
                    }),
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '{% url "dashboard" %}';
                } else {
                    this.error = data.error || 'Error al iniciar sesión.';
                }
            } catch (e) {
                this.error = 'Error de conexión. Verifica tu internet e intenta de nuevo.';
            } finally {
                this.loading = false;
            }
        },
    };
}
</script>
{% endblock %}
