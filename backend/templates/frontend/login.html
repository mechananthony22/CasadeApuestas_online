{% extends "base.html" %}
{% load static %}

{% block title %}Iniciar Sesión - FairBet Lab{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md"
         x-data="loginForm()"
         x-init="init()">

        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">FairBet Lab</h1>
            <p class="text-gray-500 mt-2">Plataforma educativa de apuestas deportivas</p>
        </div>

        <form @submit.prevent="submit" class="space-y-5">
            <div>
                <label class="block text-gray-700 font-medium mb-1.5">Usuario</label>
                <input type="text" x-model="username" required autocomplete="username"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                    placeholder="Ingresa tu usuario">
            </div>

            <div>
                <label class="block text-gray-700 font-medium mb-1.5">Contraseña</label>
                <input type="password" x-model="password" required autocomplete="current-password"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                    placeholder="Ingresa tu contraseña">
            </div>

            <template x-if="error">
                <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm" x-text="error"></div>
            </template>

            <button type="submit" :disabled="loading"
                class="w-full bg-indigo-600 text-white py-3.5 rounded-xl font-semibold text-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition flex items-center justify-center gap-2">
                <span x-show="!loading">Iniciar Sesión</span>
                <span x-show="loading" class="flex items-center gap-2">
                    <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                    </svg>
                    Ingresando...
                </span>
            </button>
        </form>

        <p class="text-center mt-6 text-gray-500">
            ¿No tienes cuenta?
            <a href="{% url 'register' %}" class="text-indigo-600 hover:text-indigo-800 font-medium hover:underline">Regístrate aquí</a>
        </p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function getCookie(name) {
    let val = null;
    if (document.cookie) {
        document.cookie.split('; ').some(c => {
            if (c.startsWith(name + '=')) { val = decodeURIComponent(c.substring(name.length + 1)); return true; }
        });
    }
    return val;
}

function loginForm() {
    return {
        username: '',
        password: '',
        error: '',
        loading: false,
        init() {
            if (localStorage.getItem('access_token')) {
                window.location.href = '{% url "dashboard" %}';
            }
        },
        async submit() {
            this.error = '';
            this.loading = true;
            try {
                const res = await fetch('/api/v1/auth/login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken'),
                    },
                    body: JSON.stringify({
                        username: this.username,
                        password: this.password,
                    }),
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '{% url "dashboard" %}';
                } else {
                    this.error = data.error || 'Error al iniciar sesión.';
                }
            } catch (e) {
                this.error = 'Error de conexión. Verifica tu internet e intenta de nuevo.';
            } finally {
                this.loading = false;
            }
        },
    };
}
</script>
{% endblock %}
